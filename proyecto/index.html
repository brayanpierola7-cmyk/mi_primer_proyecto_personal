<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Juego</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container" id="menu">
  <h1>TRES EN RAYA</h1>

  <input type="text" id="name1" placeholder="Jugador 1">
  <input type="text" id="name2" placeholder="Jugador 2">

  <select id="mode">
    <option value="2">2 Jugadores</option>
    <option value="bot">Contra Bot</option>
  </select>

  <button onclick="startGame()">Iniciar</button>
</div>

<div id="game">
  <h2 id="turn"></h2>
  <div class="grid" id="grid"></div>
  <h2 id="result"></h2>
  <h3 id="score"></h3>

  <button onclick="restart()">Reiniciar</button>
  <button onclick="backMenu()">Menú</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="winSound" src="https://www.soundjay.com/button/beep-10.wav"></audio>

<script src="script.js"></script>
</body>
</html>
